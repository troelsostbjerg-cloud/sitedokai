<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <title>Client Room teaser scene 01</title>
    <link rel="stylesheet" href="./common.css" />
  </head>
  <body style="--shot-position: 50% 18%; --shot-scale: 1.03;">
    <div class="brand">SitedokAI</div>
    <div class="meta">Guidet preview</div>
    <section class="stage">
      <div class="lead-block">
        <p class="kicker">Client Room</p>
        <h1>Få status, prioritering og næste skridt på én side.</h1>
        <p class="lede">En kort guidet tur i den kundeoplevelse, I faktisk får efter en audit.</p>
      </div>

      <div class="visual-card">
        <div class="browser-bar">
          <div class="browser-left">
            <span class="dot dot-red"></span>
            <span class="dot dot-amber"></span>
            <span class="dot dot-green"></span>
            <span class="browser-title">Client Room · Nordisk Køkken</span>
          </div>
          <span class="browser-pill">Overblik</span>
        </div>

        <div class="screen-viewport">
          <img class="shot" src="../screens/overview.png" alt="" />
        </div>
      </div>
    </section>
  </body>
</html>
