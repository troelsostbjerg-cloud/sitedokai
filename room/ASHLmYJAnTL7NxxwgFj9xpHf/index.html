<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Mieritz Advokatfirma · Client Room</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --panel: rgba(8, 17, 31, 0.92);
        --panel-soft: rgba(255, 255, 255, 0.05);
        --border: rgba(103, 232, 249, 0.14);
        --text: #e5eef9;
        --muted: #98a9c2;
        --accent: #f59e0b;
        --cyan: #22d3ee;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(34, 211, 238, 0.14), transparent 24rem),
          radial-gradient(circle at right 20%, rgba(245, 158, 11, 0.14), transparent 22rem),
          linear-gradient(180deg, #07111f 0%, #0b1728 100%);
      }
      .lock-shell {
        width: min(100%, 460px);
        padding: 32px;
        border-radius: 28px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 30px 80px rgba(2, 8, 23, 0.42);
      }
      .eyebrow {
        color: var(--cyan);
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 0.72rem;
        font-weight: 700;
      }
      h1 {
        margin: 12px 0 10px;
        font-family: "Bricolage Grotesque", Inter, system-ui, sans-serif;
        font-size: clamp(2rem, 4vw, 2.8rem);
        line-height: 0.98;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }
      form {
        display: grid;
        gap: 12px;
        margin-top: 22px;
      }
      label {
        font-size: 0.9rem;
        font-weight: 700;
      }
      input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-size: 1rem;
      }
      button {
        padding: 14px 18px;
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: #111827;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
      }
      .status {
        margin-top: 16px;
        min-height: 24px;
        color: var(--muted);
        font-size: 0.94rem;
      }
      .status.error {
        color: #fecaca;
      }
      .status.success {
        color: #bbf7d0;
      }
      .inline-link {
        color: var(--cyan);
      }
      .pdf-view {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-rows: auto 1fr;
        background: #0b1728;
      }
      .pdf-toolbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        padding: 16px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(7, 17, 31, 0.96);
      }
      .pdf-toolbar a {
        color: #111827;
        background: var(--accent);
        padding: 10px 14px;
        border-radius: 999px;
        font-weight: 800;
      }
      .pdf-frame {
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="lock-shell">
      <div class="eyebrow">Privat Client Room</div>
      <h1 id="headline"></h1>
      <p id="intro"></p>
      <form id="unlock-form">
        <label for="password">Adgangskode</label>
        <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>
        <button type="submit">Lås op</button>
      </form>
      <div id="status" class="status"></div>
    </main>
    <script>
      const pageTitle = "Mieritz Advokatfirma · Client Room";
      const headline = "Mieritz Advokatfirma";
      const intro = "Skriv adgangskoden, du har fået sammen med linket, for at dekryptere og åbne Client Room.";
      const encryptedFilename = "./room.enc.json";
      const successMode = "html";
      const successTitle = "Mieritz Advokatfirma · Client Room";
      const sessionKey = "sitedok_room_html_ASHLmYJAnTL7NxxwgFj9xpHf";
      const downloadFilename = "Executive.pdf";
      document.title = pageTitle;
      document.getElementById("headline").textContent = headline;
      document.getElementById("intro").textContent = intro;

      function setStatus(message, kind = "") {
        const node = document.getElementById("status");
        node.textContent = message;
        node.className = kind ? `status ${kind}` : "status";
      }

      function b64ToBytes(value) {
        const binary = atob(value);
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return bytes;
      }

      function bytesToUtf8(bytes) {
        return new TextDecoder().decode(bytes);
      }

      async function deriveKey(password, salt, iterations) {
        const baseKey = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(password),
          "PBKDF2",
          false,
          ["deriveKey"],
        );
        return crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            hash: "SHA-256",
            salt,
            iterations,
          },
          baseKey,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"],
        );
      }

      async function decryptPayload(password) {
        const response = await fetch(encryptedFilename, { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Kunne ikke hente det krypterede room.");
        }
        const payload = await response.json();
        const salt = b64ToBytes(payload.salt_b64);
        const iv = b64ToBytes(payload.iv_b64);
        const ciphertext = b64ToBytes(payload.ciphertext_b64);
        const key = await deriveKey(password, salt, payload.iterations);
        const plaintext = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
        return new Uint8Array(plaintext);
      }

      async function unlock(password) {
        setStatus("Låser op...", "");
        try {
          const bytes = await decryptPayload(password);
          if (successMode === "html") {
            const html = bytesToUtf8(bytes);
            if (sessionKey) {
              sessionStorage.setItem(sessionKey, html);
            }
            document.open();
            document.write(html);
            document.close();
            return;
          }

          const blob = new Blob([bytes], { type: "application/pdf" });
          const blobUrl = URL.createObjectURL(blob);
          const wrapper = document.createElement("div");
          wrapper.className = "pdf-view";
          wrapper.innerHTML = `
            <div class="pdf-toolbar">
              <strong>${successTitle}</strong>
              <a href="${blobUrl}" download="${downloadFilename}">Download PDF</a>
            </div>
            <iframe class="pdf-frame" src="${blobUrl}" title="${successTitle}"></iframe>
          `;
          document.body.innerHTML = "";
          document.body.appendChild(wrapper);
          document.title = successTitle;
          return;
        } catch (error) {
          setStatus("Adgangskoden passer ikke, eller roomet kunne ikke dekrypteres.", "error");
        }
      }

      if (sessionKey) {
        const cachedHtml = sessionStorage.getItem(sessionKey);
        if (cachedHtml) {
          document.open();
          document.write(cachedHtml);
          document.close();
        }
      }

      document.getElementById("unlock-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = document.getElementById("password").value;
        await unlock(password);
      });
    </script>
  </body>
</html>
